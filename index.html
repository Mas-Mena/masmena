    <!-- Calendly: defer stylesheet and script so they don't block render -->
    <link rel="dns-prefetch" href="https://assets.calendly.com" />
    <script>
      // Load Calendly resources after the page is interactive
      function loadCalendly() {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://assets.calendly.com/assets/external/widget.css';
        document.head.appendChild(link);

        var script = document.createElement('script');
        script.src = 'https://assets.calendly.com/assets/external/widget.js';
        script.async = true;
        document.head.appendChild(script);
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadCalendly);
      } else {
        // Delay slightly so we don't compete with React hydration
        setTimeout(loadCalendly, 1000);
      }
    </script>
